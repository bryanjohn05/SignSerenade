    <title>Action Recognition</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            text-align: center;
        }
        #video-feed {
            max-width: 100%;
            border: 2px solid #333;
            border-radius: 5px;
        }
        #action-result {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #007bff;
        }
        #capture-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color:#c7d7f5;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
